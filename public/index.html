<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <main class="main-content">
    <div class="top-bar">
      <div class="scene-breadcrumb">
        <span class="act-name" id="breadcrumb-act">Loading...</span>
        <span class="scene-title" id="breadcrumb-title">Please wait</span>
      </div>
      <div class="controls">
        <span class="page-display" id="page-display">Page --</span>
        <div class="goto-container">
          <button class="nav-btn" onclick="toggleGoto()">Go to Page</button>
          <div class="goto-input" id="goto-input">
            <input type="number" id="page-number" placeholder="Page #" min="1" onkeydown="if(event.key==='Enter') goToPageNumber()">
            <button class="nav-btn" onclick="goToPageNumber()">Go</button>
          </div>
        </div>
        <div class="zoom-controls">
          <button class="nav-btn" onclick="zoomOut()">−</button>
          <span class="zoom-level" id="zoom-level">100%</span>
          <button class="nav-btn" onclick="zoomIn()">+</button>
        </div>
      </div>
    </div>

    <div class="script-scroll-container" id="scroll-container">
      <div class="script-content" id="script-content">
        <div class="welcome-panel">
          <h2>Loading script...</h2>
        </div>
      </div>
    </div>
  </main>

  <!-- Cue Modal -->
  <div class="cue-modal-overlay" id="cue-modal-overlay" onclick="closeCueModal(event)">
    <div class="cue-modal">
      <div class="cue-modal-header">
        <div class="cue-modal-header-left">
          <h2 class="cue-modal-title" id="cue-modal-title">Add Cue</h2>
          <span class="cue-modal-context" id="cue-modal-context"></span>
        </div>
        <button class="cue-modal-close" onclick="closeCueModal()">✕</button>
      </div>

      <!-- Existing cues list (always visible when cues exist) -->
      <div class="cue-modal-existing" id="cue-modal-existing" style="display:none">
        <div class="cue-modal-existing-label">Cues on this line</div>
        <div class="cue-modal-existing-list" id="cue-modal-existing-list"></div>
      </div>

      <div class="cue-modal-body">
        <!-- Type selector -->
        <div class="cue-type-selector" id="cue-type-selector">
          <button class="cue-type-btn" data-type="lighting" onclick="selectCueType('lighting')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M12 2v1M12 21v1M4.22 4.22l.7.7M19.08 19.08l.7.7M2 12h1M21 12h1M4.22 19.78l.7-.7M19.08 4.92l.7-.7M12 6a6 6 0 0 0 0 12"/></svg>
            Lighting
          </button>
          <button class="cue-type-btn" data-type="sound" onclick="selectCueType('sound')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            Sound
          </button>
        </div>

        <!-- Sound options (shown when type=sound) -->
        <div id="sound-section" class="sound-section" style="display:none">

          <!-- Sub-type -->
          <div class="sound-subtype-bar">
            <button class="sound-sub-btn selected" data-subtype="play_once" onclick="selectSoundSubtype('play_once')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Play Once
            </button>
            <button class="sound-sub-btn" data-subtype="vamp" onclick="selectSoundSubtype('vamp')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              Vamp
            </button>
          </div>

          <!-- Clip selector -->
          <div class="clip-row">
            <div class="clip-name-area">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;opacity:.4"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              <span id="clip-name-text">No clip selected</span>
            </div>
            <button class="btn btn-ghost btn-xs" type="button" onclick="toggleClipBrowser()">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              Browse
            </button>
            <label class="btn btn-ghost btn-xs" for="clip-file-input">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload
            </label>
            <input type="file" id="clip-file-input" accept="audio/*" style="display:none" onchange="handleClipUpload(this.files[0])">
          </div>

          <!-- Clip browser -->
          <div class="clip-browser" id="clip-browser">
            <div class="clip-browser-inner" id="clip-browser-inner">
              <div class="clip-browser-msg">Loading…</div>
            </div>
          </div>

          <!-- Preview bar -->
          <div class="preview-bar" id="preview-bar" style="display:none">
            <button class="preview-btn" id="preview-play-btn" onclick="previewToggle()">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Preview
            </button>
            <button class="preview-devamp-btn" id="preview-devamp-btn" onclick="previewDevamp()" style="display:none">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              Vamp Out
            </button>
            <span class="preview-status" id="preview-status"></span>
          </div>

          <!-- Waveform -->
          <div class="waveform-container" id="waveform-container">
            <div class="waveform-empty" id="waveform-empty">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              No audio loaded
            </div>
            <div class="waveform-loading" id="waveform-loading" style="display:none">
              <div class="waveform-loading-bar"></div>
            </div>
            <canvas id="waveform-canvas" style="display:none; position:absolute; top:0; left:0"></canvas>
            <div id="wf-handle-layer" style="display:none; position:absolute; inset:0; pointer-events:none"></div>
          </div>

          <!-- Play style -->
          <div class="ssg">
            <div class="ssg-label">Play style</div>
            <div class="seg-control" id="play-style-control">
              <button class="seg-btn selected" data-value="alongside" onclick="selectPlayStyle(this)">Alongside</button>
              <button class="seg-btn" data-value="wait" onclick="selectPlayStyle(this)">Wait</button>
              <button class="seg-btn" data-value="fade_all" onclick="selectPlayStyle(this)">Fade all</button>
              <button class="seg-btn" data-value="xfade" onclick="selectPlayStyle(this)">X-Fade</button>
            </div>
          </div>

          <!-- Trim -->
          <div class="ssg">
            <div class="ssg-label">Trim</div>
            <div class="prows">
              <div class="prow">
                <span class="plabel">Start</span>
                <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-trim" id="pf-clip-start"></div></div><input type="range" class="ptrack" id="ps-clip-start" min="0" max="60" step="0.001" value="0" oninput="onParamChange('p-clip-start','slider')"></div>
                <input type="number" class="pnum" id="p-clip-start" min="0" step="0.001" value="0" oninput="onParamChange('p-clip-start','number')">
                <span class="punit">s</span>
              </div>
              <div class="prow">
                <span class="plabel">End</span>
                <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-trim" id="pf-clip-end"></div></div><input type="range" class="ptrack" id="ps-clip-end" min="0" max="60" step="0.001" value="60" oninput="onParamChange('p-clip-end','slider')"></div>
                <input type="number" class="pnum" id="p-clip-end" min="0" step="0.001" placeholder="—" oninput="onParamChange('p-clip-end','number')">
                <span class="punit">s</span>
              </div>
            </div>
          </div>

          <!-- Fades -->
          <div class="ssg">
            <div class="ssg-label">Fades</div>
            <div class="prows">
              <div class="prow">
                <span class="plabel">Fade in</span>
                <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-fade" id="pf-fade-in"></div></div><input type="range" class="ptrack" id="ps-fade-in" min="0" max="30" step="0.001" value="0" oninput="onParamChange('p-fade-in','slider')"></div>
                <input type="number" class="pnum" id="p-fade-in" min="0" step="0.001" value="0" oninput="onParamChange('p-fade-in','number')">
                <span class="punit">s</span>
              </div>
              <div class="prow">
                <span class="plabel">Fade out</span>
                <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-fade" id="pf-fade-out"></div></div><input type="range" class="ptrack" id="ps-fade-out" min="0" max="30" step="0.001" value="0" oninput="onParamChange('p-fade-out','slider')"></div>
                <input type="number" class="pnum" id="p-fade-out" min="0" step="0.001" value="0" oninput="onParamChange('p-fade-out','number')">
                <span class="punit">s</span>
              </div>
              <div class="prow">
                <span class="plabel">Manual f/o</span>
                <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-muted" id="pf-manual-fo"></div></div><input type="range" class="ptrack" id="ps-manual-fo" min="0.1" max="30" step="0.1" value="2" oninput="onParamChange('p-manual-fo','slider')"></div>
                <input type="number" class="pnum" id="p-manual-fo" min="0.1" step="0.1" value="2" oninput="onParamChange('p-manual-fo','number')">
                <span class="punit">s</span>
              </div>
            </div>
          </div>

          <!-- Level -->
          <div class="ssg">
            <div class="ssg-label">Level</div>
            <div class="prows">
              <div class="prow">
                <span class="plabel">Volume</span>
                <div class="ptrack-wrap"><div class="ptrack-bg ptrack-bg-vol"><div class="ptrack-zerodb"></div><div class="ptrack-fill pf-vol" id="pf-volume"></div></div><input type="range" class="ptrack" id="ps-volume" min="-40" max="20" step="0.5" value="0" oninput="onParamChange('p-volume','slider')"></div>
                <input type="number" class="pnum" id="p-volume" min="-40" max="20" step="0.5" value="0" oninput="onParamChange('p-volume','number')">
                <span class="punit">dB</span>
              </div>
            </div>
          </div>

          <!-- Allow multi -->
          <div class="sound-extras">
            <label class="toggle-row">
              <input type="checkbox" id="p-allow-multi" checked>
              <span>Allow multiple instances</span>
            </label>
          </div>

          <!-- Vamp section -->
          <div id="vamp-section" style="display:none">
            <div class="vamp-divider">Loop</div>
            <div class="ssg">
              <div class="ssg-label">Range</div>
              <div class="prows">
                <div class="prow">
                  <span class="plabel">Start</span>
                  <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-loop" id="pf-loop-start"></div></div><input type="range" class="ptrack" id="ps-loop-start" min="0" max="60" step="0.001" value="0" oninput="onParamChange('p-loop-start','slider')"></div>
                  <input type="number" class="pnum" id="p-loop-start" min="0" step="0.001" value="0" oninput="onParamChange('p-loop-start','number')">
                  <span class="punit">s</span>
                </div>
                <div class="prow">
                  <span class="plabel">End</span>
                  <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-loop" id="pf-loop-end"></div></div><input type="range" class="ptrack" id="ps-loop-end" min="0" max="60" step="0.001" value="60" oninput="onParamChange('p-loop-end','slider')"></div>
                  <input type="number" class="pnum" id="p-loop-end" min="0" step="0.001" placeholder="—" oninput="onParamChange('p-loop-end','number')">
                  <span class="punit">s</span>
                </div>
                <div class="prow">
                  <span class="plabel">X-fade</span>
                  <div class="ptrack-wrap"><div class="ptrack-bg"><div class="ptrack-fill pf-loop" id="pf-loop-xfade"></div></div><input type="range" class="ptrack" id="ps-loop-xfade" min="0" max="30" step="0.001" value="0" oninput="onParamChange('p-loop-xfade','slider')"></div>
                  <input type="number" class="pnum" id="p-loop-xfade" min="0" step="0.001" value="0" oninput="onParamChange('p-loop-xfade','number')">
                  <span class="punit">s</span>
                </div>
              </div>
            </div>
            <div class="ssg">
              <div class="ssg-label">Devamp</div>
              <select id="p-devamp-action" class="param-select">
                <option value="play_out" selected>Play out (finish loop)</option>
                <option value="fade_out">Fade out</option>
                <option value="jump_to_end">Jump to end of loop</option>
                <option value="fade_to_end">Fade to end of loop</option>
              </select>
            </div>
          </div>

        </div>

        <div class="form-group">
          <label for="cue-title">Title</label>
          <input type="text" id="cue-title" placeholder="e.g., Blackout, Thunder roll" autocomplete="off"
                 onkeydown="handleCueModalKeydown(event)">
        </div>

        <div class="form-group">
          <label for="cue-description">
            Notes
            <span class="label-hint">optional</span>
          </label>
          <textarea id="cue-description" rows="2" placeholder="Additional notes..."
                    onkeydown="handleCueModalKeydown(event)"></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeCueModal()">Cancel</button>
        <button class="btn btn-danger" id="btn-delete-cue" onclick="deleteCue()" style="display:none">Delete</button>
        <button class="btn btn-primary" onclick="saveCue()">
          Save
          <span class="btn-hint">↵</span>
        </button>
      </div>
    </div>
  </div>

  <script src="scripts/tone.js"></script>
  <script src="scripts/audio-preview.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
