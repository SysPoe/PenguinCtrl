<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <main class="main-content">
    <div class="top-bar">
      <div class="scene-breadcrumb">
        <span class="act-name" id="breadcrumb-act">Loading...</span>
        <span class="scene-title" id="breadcrumb-title">Please wait</span>
      </div>
      <div class="controls">
        <span class="page-display" id="page-display">Page --</span>
        <div class="goto-container">
          <button class="nav-btn" onclick="toggleGoto()">Go to Page</button>
          <div class="goto-input" id="goto-input">
            <input type="number" id="page-number" placeholder="Page #" min="1" onkeydown="if(event.key==='Enter') goToPageNumber()">
            <button class="nav-btn" onclick="goToPageNumber()">Go</button>
          </div>
        </div>
        <div class="zoom-controls">
          <button class="nav-btn" onclick="zoomOut()">−</button>
          <span class="zoom-level" id="zoom-level">100%</span>
          <button class="nav-btn" onclick="zoomIn()">+</button>
        </div>
      </div>
    </div>

    <div class="script-scroll-container" id="scroll-container">
      <div class="script-content" id="script-content">
        <div class="welcome-panel">
          <h2>Loading script...</h2>
        </div>
      </div>
    </div>
  </main>

  <!-- Cue Modal -->
  <div class="cue-modal-overlay" id="cue-modal-overlay" onclick="closeCueModal(event)">
    <div class="cue-modal">
      <h2 id="cue-modal-title">Add Cue</h2>

      <div class="cue-exists-indicator" id="cue-exists-indicator" style="display: none;">
        <span>Existing cues on this line:</span>
        <span class="existing-cue lighting" id="existing-lighting-cue"></span>
        <span class="existing-cue sound" id="existing-sound-cue"></span>
      </div>

      <div class="cue-type-selector">
        <div class="cue-type-option" data-type="lighting" onclick="selectCueType('lighting')">
          <strong>Lighting</strong>
        </div>
        <div class="cue-type-option" data-type="sound" onclick="selectCueType('sound')">
          <strong>Sound</strong>
        </div>
      </div>

      <div class="form-group">
        <label>Cue Title</label>
        <input type="text" id="cue-title" placeholder="e.g., Blackout, BGM">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="cue-description" placeholder="e.g., Fade to black, Background music fades in"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeCueModal()">Cancel</button>
        <button class="btn btn-delete" id="btn-delete-cue" onclick="deleteCue()" style="display: none;">Delete</button>
        <button class="btn btn-save" onclick="saveCue()">Save Cue</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
