<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cue List</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #161618;
      --bg2: #1e1e21;
      --bg3: #272729;
      --border: #404044;
      --border2: #2c2c2f;
      --text: #e8e8e8;
      --text2: #a0a0a8;
      --text3: #60606a;
      --accent: #1a7fd4;
      --accent-h: #2490e8;
      --sel-bg: rgba(26, 127, 212, 0.2);
      --sel-bdr: rgba(26, 127, 212, 0.7);
    }

    body {
      font-family: 'Courier Prime', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── WS error banner ── */
    #ws-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #7a1010;
      border-bottom: 2px solid #c02020;
      color: #ffd0d0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 8px 16px;
      text-transform: uppercase;
      flex-shrink: 0;
      animation: pulse-banner 1.4s ease-in-out infinite;
    }

    #ws-banner.show {
      display: flex;
    }

    @keyframes pulse-banner {

      0%,
      100% {
        background: #7a1010;
      }

      50% {
        background: #a01818;
      }
    }

    .ws-banner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6060;
      box-shadow: 0 0 6px #ff4040;
      flex-shrink: 0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 13px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 38px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-count {
      font-size: 11px;
      color: var(--text3);
    }

    .ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text3);
      display: inline-block;
      margin-left: 4px;
      transition: background 0.3s;
    }

    .ws-dot.connected {
      background: #3abf6a;
      box-shadow: 0 0 4px #3abf6a88;
    }

    .ws-dot.error {
      background: #e04040;
      box-shadow: 0 0 6px #e0404088;
    }

    .header-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
    }

    .header-btn:hover {
      border-color: var(--text2);
      color: var(--text);
    }

    .btn-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 11px;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .btn-reset:hover {
      color: var(--text2);
      border-color: var(--text2);
    }

    /* ── Cue table pane ── */
    .pane-top {
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 80px;
    }

    .cue-table-wrap {
      flex: 1;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    th {
      background: var(--bg2);
      color: var(--text3);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 5px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      white-space: nowrap;
    }

    th.r {
      text-align: right;
    }

    td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border2);
      vertical-align: middle;
      white-space: nowrap;
    }

    tr.cue-row {
      cursor: pointer;
      transition: background 0.06s;
    }

    tr.cue-row:hover {
      background: var(--bg3);
    }

    tr.cue-row.selected {
      background: var(--sel-bg);
      outline: 1px solid var(--sel-bdr);
      outline-offset: -1px;
    }

    .cue-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 700;
      min-width: 36px;
    }

    .cue-num.s {
      background: #183818;
      color: #7ae87a;
      border: 1px solid #2a6a2a;
    }

    .cue-num.l {
      background: #3a2c00;
      color: #f0c840;
      border: 1px solid #6a5000;
    }

    .cue-title-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge.vamp {
      background: rgba(110, 70, 200, 0.3);
      color: #c0a0ff;
      border: 1px solid rgba(110, 70, 200, 0.5);
    }

    .badge.once {
      background: rgba(40, 110, 40, 0.3);
      color: #80e080;
      border: 1px solid rgba(40, 110, 40, 0.5);
    }

    .badge.light {
      background: rgba(160, 120, 0, 0.3);
      color: #f0d060;
      border: 1px solid rgba(160, 120, 0, 0.5);
    }

    .len {
      color: var(--text2);
      text-align: right;
      font-size: 13px;
    }

    .col-num {
      width: 52px;
    }

    .col-type {
      width: 64px;
    }

    .col-len {
      width: 58px;
      text-align: right;
    }

    /* Played tick */
    tr.cue-row.played td:first-child::before {
      content: '✓';
      color: #4abf5a;
      font-size: 12px;
      margin-right: 4px;
    }

    tr.cue-row.played .cue-title-cell {
      color: var(--text3);
    }

    /* ── Resizer ── */
    .resizer {
      height: 6px;
      background: var(--border);
      cursor: ns-resize;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .resizer:hover,
    .resizer.dragging {
      background: var(--accent);
    }

    /* ── Bottom pane ── */
    .pane-bottom {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 80px;
    }

    /* Transport column */
    .transport {
      width: 30%;
      min-width: 130px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      border-right: 1px solid var(--border);
      background: var(--bg2);
    }

    .master-vol-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }

    .master-vol-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text2);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .master-vol-label span {
      color: var(--text);
      font-size: 12px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      background: var(--bg3);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #e0e0e8;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    input[type=range]:active::-webkit-slider-thumb {
      background: #fff;
    }

    .transport-btns {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn-transport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: filter 0.1s, transform 0.06s;
      min-height: 36px;
    }

    .btn-transport:active {
      transform: scale(0.97);
    }

    .btn-go {
      background: #1e8c40;
      color: #ffffff;
      font-size: 18px;
      flex: 2;
      border: 1px solid #2ab856;
    }

    .btn-go:hover:not(:disabled) {
      filter: brightness(1.15);
    }

    .btn-go:disabled {
      background: #1a2a1a;
      color: #405040;
      border-color: #2a3a2a;
      cursor: default;
    }

    .btn-fade {
      background: #5a4200;
      color: #f0c040;
      border: 1px solid #8a6600;
    }

    .btn-fade:hover {
      filter: brightness(1.2);
    }

    .btn-stop {
      background: #7a1a1a;
      color: #ffa0a0;
      border: 1px solid #c03030;
    }

    .btn-stop:hover {
      filter: brightness(1.2);
    }

    /* Voices panel */
    .voices-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .voices-header {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border2);
      flex-shrink: 0;
    }

    .voice-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
    }

    .voice-row.deramping {
      opacity: 0.5;
    }

    .voice-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .voice-name {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .voice-vol-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .voice-vol-label {
      font-size: 10px;
      color: var(--text2);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    input[type=range].voice-vol {
      height: 4px;
      flex: 1;
      min-width: 60px;
    }

    input[type=range].voice-vol::-webkit-slider-thumb {
      width: 12px;
      height: 12px;
    }

    .voice-actions {
      display: flex;
      gap: 4px;
    }

    .btn-voice {
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .btn-voice:hover {
      color: var(--text);
      border-color: var(--text2);
    }

    .btn-voice.devamp {
      color: #c0a0ff;
      border-color: rgba(130, 90, 220, 0.6);
    }

    .btn-voice.devamp:hover {
      background: rgba(110, 70, 200, 0.25);
    }

    .btn-voice.fade {
      color: #f0c840;
      border-color: rgba(160, 120, 0, 0.6);
    }

    .btn-voice.fade:hover {
      background: rgba(120, 90, 0, 0.25);
    }

    .btn-voice.stop {
      color: #ff9090;
      border-color: rgba(180, 40, 40, 0.6);
    }

    .btn-voice.stop:hover {
      background: rgba(140, 30, 30, 0.3);
    }

    .no-voices {
      color: var(--text3);
      font-size: 13px;
      font-style: italic;
      padding: 10px 0;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3);
    }

    .empty-cues {
      padding: 24px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div id="ws-banner">
    <div class="ws-banner-dot"></div>
    WebSocket Disconnected — Reconnecting...
  </div>

  <div class="header">
    <div class="header-left">
      <span class="header-title">Cue List</span>
      <span class="header-count" id="cue-count">—</span>
      <span class="ws-dot" id="ws-dot" title="WebSocket status"></span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn-reset" onclick="resetPlayed()" title="Clear all tick marks">Reset</button>
      <button class="header-btn" onclick="requestCues()">Refresh</button>
    </div>
  </div>

  <div class="pane-top" id="pane-top" style="height: 55vh;">
    <div class="cue-table-wrap">
      <table id="cue-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th>Title</th>
            <th class="col-type">Type</th>
            <th class="col-len r">Length</th>
          </tr>
        </thead>
        <tbody id="cue-tbody"></tbody>
      </table>
      <div class="empty-cues" id="empty-cues" style="display:none">No cues defined</div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="pane-bottom">
    <div class="transport">
      <div class="master-vol-row">
        <div class="master-vol-label">Master Vol <span id="master-db-label">+0.0 dB</span></div>
        <input type="range" id="master-vol" min="-40" max="6" step="0.5" value="0" oninput="onMasterVol(this.value)">
      </div>
      <div class="transport-btns">
        <button class="btn-transport btn-go" id="btn-go" onclick="goSelected()" disabled>GO</button>
        <button class="btn-transport btn-fade" onclick="fadeAll()">Fade All</button>
        <button class="btn-transport btn-stop" onclick="stopAll()">Stop All</button>
      </div>
    </div>

    <div class="voices-panel">
      <div class="voices-header">Active Voices</div>
      <div id="voices-list">
        <div class="no-voices">No active voices</div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let cuesData = [];
    let selectedIdx = -1;
    let ws = null;
    let activeInstances = [];
    let playedIds = new Set();

    // ── WebSocket ──────────────────────────────────────────────────────────────
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      const dot = document.getElementById('ws-dot');
      const banner = document.getElementById('ws-banner');

      ws.onopen = () => {
        dot.className = 'ws-dot connected';
        banner.classList.remove('show');
      };
      ws.onclose = () => {
        dot.className = 'ws-dot error';
        banner.classList.add('show');
        setTimeout(connectWS, 2000);
      };
      ws.onerror = () => {
        dot.className = 'ws-dot error';
        banner.classList.add('show');
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'instances') {
          activeInstances = msg.list || [];
          renderVoices();
        } else if (msg.type === 'playedCues') {
          playedIds = new Set(msg.ids || []);
          applyPlayedTicks();
        } else if (msg.type === 'masterVolume') {
          const slider = document.getElementById('master-vol');
          if (slider && !slider.matches(':active')) {
            const db = msg.db ?? 0;
            slider.value = Math.max(-40, Math.min(6, db));
            document.getElementById('master-db-label').textContent = fmtDbLabel(db);
          }
        } else if (msg.type === 'error') {
          console.error('Error from server:', msg);
        }
      };
    }

    function wsSend(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    // ── Cue data ───────────────────────────────────────────────────────────────
    function requestCues() {
      if (window.opener && window.opener.postMessage) {
        window.opener.postMessage({ type: 'requestCues' }, '*');
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'cueData') {
        cuesData = e.data.cues || [];
        renderCues();
      }
    });

    // ── Formatting ─────────────────────────────────────────────────────────────
    function fmtDur(s) {
      if (!s || s <= 0) return '—';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function fmtDb(db) {
      if (!isFinite(db) || db <= -40) return '-∞';
      return `${db >= 0 ? '+' : ''}${db.toFixed(1)}`;
    }

    function escHtml(t) {
      if (!t) return '';
      return String(t).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
    }

    // ── Render cue table ───────────────────────────────────────────────────────
    function renderCues() {
      const tbody = document.getElementById('cue-tbody');
      const empty = document.getElementById('empty-cues');
      const count = document.getElementById('cue-count');

      count.textContent = `${cuesData.length} cue${cuesData.length !== 1 ? 's' : ''}`;

      if (!cuesData.length) {
        tbody.innerHTML = '';
        empty.style.display = '';
        setSelected(-1);
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = cuesData.map((cue, i) => {
        const isS = cue.cueType === 'sound';
        const numClass = isS ? 's' : 'l';
        const numLabel = isS ? `S${cue.number}` : `L${cue.number}`;
        let badge = '';
        if (isS) {
          const st = cue.soundType || 'play_once';
          badge = st === 'vamp'
            ? '<span class="badge vamp">Vamp</span>'
            : '<span class="badge once">Once</span>';
        } else {
          badge = '<span class="badge light">Light</span>';
        }
        const sel = i === selectedIdx ? ' selected' : '';
        const played = playedIds.has(cue.id) ? ' played' : '';
        return `<tr class="cue-row${sel}${played}" data-idx="${i}" data-id="${escHtml(cue.id)}"
        ondblclick="goSelected()" onclick="selectRow(${i})">
      <td class="col-num"><span class="cue-num ${numClass}">${numLabel}</span></td>
      <td class="cue-title-cell">${escHtml(cue.title)}</td>
      <td class="col-type">${badge}</td>
      <td class="col-len len">${isS ? fmtDur(cue.duration) : '—'}</td>
    </tr>`;
      }).join('');

      updateGoBtn();
    }

    function applyPlayedTicks() {
      document.querySelectorAll('.cue-row[data-id]').forEach(row => {
        row.classList.toggle('played', playedIds.has(row.dataset.id));
      });
    }

    // ── Selection ──────────────────────────────────────────────────────────────
    function setSelected(idx) {
      selectedIdx = idx;
      document.querySelectorAll('.cue-row').forEach((r, i) => {
        r.classList.toggle('selected', i === idx);
      });
      updateGoBtn();
      if (idx >= 0 && cuesData[idx]) {
        if (window.opener && window.opener.postMessage) {
          window.opener.postMessage({ type: 'scrollToTarget', targetId: cuesData[idx].targetId }, '*');
        }
      }
    }

    function selectRow(i) { setSelected(i); }

    function updateGoBtn() {
      const btn = document.getElementById('btn-go');
      btn.disabled = selectedIdx < 0 || selectedIdx >= cuesData.length;
    }

    // ── Keyboard nav ───────────────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = Math.min(selectedIdx + 1, cuesData.length - 1);
        setSelected(next);
        scrollRowIntoView(next);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = Math.max(selectedIdx - 1, 0);
        setSelected(prev);
        scrollRowIntoView(prev);
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        goSelected();
      }
    });

    function scrollRowIntoView(idx) {
      const row = document.querySelector(`.cue-row[data-idx="${idx}"]`);
      if (row) row.scrollIntoView({ block: 'nearest' });
    }

    // ── Cue execution ──────────────────────────────────────────────────────────
    function goSelected() {
      if (selectedIdx < 0 || selectedIdx >= cuesData.length) return;
      const cue = cuesData[selectedIdx];

      if (cue.cueType === 'sound' && cue.fullCue) {
        wsSend({ type: 'go', cueId: cue.id, cue: cue.fullCue });
      } else {
        // Lighting or non-audio: just tick it off
        wsSend({ type: 'go', cueId: cue.id });
      }

      // Advance to next cue
      const next = selectedIdx + 1;
      if (next < cuesData.length) {
        setSelected(next);
        scrollRowIntoView(next);
      }
    }

    function fadeAll() { wsSend({ type: 'fadeOutAll', duration: 2 }); }
    function stopAll() { wsSend({ type: 'stopAll' }); }
    function resetPlayed() { wsSend({ type: 'resetPlayed' }); }

    function onMasterVol(val) {
      const db = parseFloat(val);
      document.getElementById('master-db-label').textContent = fmtDb(db) + ' dB';
      wsSend({ type: 'masterVolume', db });
    }

    function fmtDbLabel(db) {
      if (!isFinite(db) || db <= -40) return '-∞ dB';
      return `${db >= 0 ? '+' : ''}${db.toFixed(1)} dB`;
    }

    // ── Voices ─────────────────────────────────────────────────────────────────
    function renderVoices() {
      const container = document.getElementById('voices-list');
      if (!activeInstances.length) {
        container.innerHTML = '<div class="no-voices">No active voices</div>';
        return;
      }

      container.innerHTML = activeInstances.map(inst => {
        const name = inst.title || inst.clip.split('/').pop();
        const db = isFinite(inst.volume) ? inst.volume : 0;
        const deramping = inst.isDeramping ? ' deramping' : '';
        const devampBtn = inst.isVamp && !inst.isDeramping
          ? `<button class="btn-voice devamp" onclick="voiceDevamp('${inst.instanceId}')">Dvmp</button>`
          : '';
        return `<div class="voice-row${deramping}" data-iid="${inst.instanceId}">
      <div class="voice-name" title="${escHtml(name)}">${escHtml(name)}</div>
      <div class="voice-vol-wrap">
        <span class="voice-vol-label">${fmtDb(db)}</span>
        <input type="range" class="voice-vol" min="-40" max="6" step="0.5"
          value="${Math.max(-40, Math.min(6, db))}"
          oninput="voiceVol('${inst.instanceId}', this)">
      </div>
      <div class="voice-actions">
        ${devampBtn}
        <button class="btn-voice fade" onclick="voiceFade('${inst.instanceId}')">Fade</button>
        <button class="btn-voice stop" onclick="voiceStop('${inst.instanceId}')">Stop</button>
      </div>
    </div>`;
      }).join('');
    }

    function voiceDevamp(id) { wsSend({ type: 'devamp', instanceId: id }); }
    function voiceFade(id) { wsSend({ type: 'fadeOut', instanceId: id }); }
    function voiceStop(id) { wsSend({ type: 'stop', instanceId: id }); }
    function voiceVol(id, el) {
      const db = parseFloat(el.value);
      el.previousElementSibling.textContent = fmtDb(db);
      wsSend({ type: 'setVolume', instanceId: id, db });
    }

    // ── Resizer ────────────────────────────────────────────────────────────────
    (function () {
      const resizer = document.getElementById('resizer');
      const paneTop = document.getElementById('pane-top');
      let startY = 0, startH = 0;

      resizer.addEventListener('mousedown', (e) => {
        startY = e.clientY;
        startH = paneTop.offsetHeight;
        resizer.classList.add('dragging');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });

      function onDrag(e) {
        const dy = e.clientY - startY;
        const newH = Math.max(60, Math.min(window.innerHeight - 120, startH + dy));
        paneTop.style.height = newH + 'px';
      }
      function onUp() {
        resizer.classList.remove('dragging');
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onUp);
      }
    })();

    // ── Init ───────────────────────────────────────────────────────────────────
    connectWS();
    requestCues();
  </script>
</body>

</html>
